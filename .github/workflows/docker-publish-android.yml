name: Build and Push Yavsc Apk

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  apk-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      # 1. Votre étape de build actuelle (on nomme l'image "postit-android")
      - name: Build de l'image Docker
        run: docker build --build-arg ANDROID_TARGET_RID=android-arm64 -t postit-android .
      # 2. EXTRACTION : Créer un conteneur éphémère pour copier l'APK vers l'hôte GitHub
      - name: Extraire l'APK du conteneur Docker
        run: |
          docker create --name extractor postit-android
          docker cp extractor:/app/bin/Release/net10.0-android/android-arm64/PostIt.Android.apk ./PostIt.Android.apk
          docker rm extractor
        # 😉 Note du dev : Ajustez le chemin "/app/bin/Release/..." 
        # selon l'endroit exact où votre Dockerfile dépose l'APK final.

      # 3. ARCHIVAGE : L'action officielle pour rendre le fichier téléchargeable
      - name: Téléverser l'APK en tant qu'Artéfact GitHub
        uses: actions/upload-artifact@v4
        with:
          name: application-apk-release
          path: ./PostIt.Android.apk
          retention-days: 7
