services:
  db:
    image: postgres:16
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build:
      context: .
      args:
        POSTGRES_HOST: db
        POSTGRES_PORT: ${POSTGRES_PORT}
        POSTGRES_DB: ${POSTGRES_DB}
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    env_file: .env
    ports:
      - "5000:5000"
    depends_on:
      - db

volumes:
  pgdata: